<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GameZone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    header {
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      padding: 20px;
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 2px;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      background: #1e293b;
      padding: 10px;
    }

    nav a {
      color: #cbd5f5;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    nav a:hover {
      color: #fff;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: radial-gradient(circle, #1e293b, #020617);
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .hero p {
      color: #94a3b8;
    }

    .games {
      padding: 40px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 15px;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card h3 {
      margin-bottom: 5px;
    }

    .card p {
      font-size: 0.9rem;
      color: #94a3b8;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      color: #64748b;
      margin-top: 20px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 15px;
      background: #6366f1;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      background: #4f46e5;
    }
  </style>
</head>

<body>

<header>🎮 GameZone</header>

<nav>
  <a href="#">Inicio</a>
  <a href="#">Juegos</a>
  <a href="#">Ranking</a>
  <a href="#">Contacto</a>
</nav>

<section class="hero">
  <h1>Bienvenido a GameZone</h1>
  <p>Explora los mejores juegos online</p>
</section>

<section class="games">

  <div class="card">
    <img src="https://picsum.photos/400/200?random=1">
    <div class="card-content">
      <h3>Battle Arena</h3>
      <p>Juego de acción multijugador.</p>
      <a href="#" class="btn">Jugar</a>
    </div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/400/200?random=2">
    <div class="card-content">
      <h3>Speed Racer</h3>
      <p>Carreras a toda velocidad.</p>
      <a href="#" class="btn">Jugar</a>
    </div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/400/200?random=3">
    <div class="card-content">
      <h3>Zombie Survival</h3>
      <p>Sobrevive al apocalipsis.</p>
      <a href="#" class="btn">Jugar</a>
    </div>
  </div>

</section>

<footer>
  © 2026 GameZone - Todos los derechos reservados
</footer>

</body>
</html>
